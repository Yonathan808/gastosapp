name: gastosapp
description: "App simple y bonita para registrar gastos en pesos colombianos."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Navigation
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.69.0

  # UI / Icons
  iconsax: ^0.0.8
  google_fonts: ^6.2.1
  gap: ^3.0.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
